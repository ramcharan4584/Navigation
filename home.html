<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Navigation System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <h1>LIVE SERVER TEST</h1>
    <nav class="navbar">
    <div class="logo">Student Portal</div>

    <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Dashboard</a></li>
    <li><a href="#">Notices</a></li>
    <li><a href="#">Timetable</a></li>
    </ul>

  <div class="profile-section">
    <button class="profile-btn" onclick="toggleProfile()">👤 Profile</button>
  </div>
</nav>
<div id="profileCard" class="profile-card">
  <h2>Student Profile</h2>
  <p>Name: Your Name</p>
  <p>Roll No: XXXXX</p>
  <p>Branch: IT</p>
  <p>Year: 2nd Year</p>
</div>

    <!-- Header -->
    <header>
        <h1>College Navigation System</h1>
        <p>Find Classrooms, Labs, and Departments Easily</p>
    </header>

    <!-- Search Section -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search classroom / lab / block...">
        <button onclick="searchLocation()">Search</button>
    </div>

    <!-- Quick Links -->
    <div class="menu">
        <a href="#">Departments</a>
        <a href="#">College Map</a>
        <a href="#">About College</a>
        <a href="#">Contact</a>
    </div>

    <!-- Result Box -->
    <div id="resultBox"></div>

    <script src="script.js"></script>

</body>
</html>
