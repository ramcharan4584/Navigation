<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Favorites</title>
  <link rel="stylesheet" href="mostordered.css">
  <link rel="stylesheet" href="backbutton.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <header class="most-header">
  <button class="back-btn" onclick="history.back()">
  <i class="fa-solid fa-arrow-left"></i>
  </button>
  <h1>Most Ordered Foods</h1>
  <p>Loved food items in campus</p>
</header>

<section class="most-section">
  <div class="section-heading">
    <p>Live ranking from UniEats order history</p>
  </div>

  <div class="most-table-card">
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Food Item</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="mostOrderedBoard">
        <tr>
          <td colspan="3">Loading most ordered foods...</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
  <script src="mostordered.js"></script>

</body>
</html>
