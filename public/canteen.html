<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Dining</title>
  <link rel="stylesheet" href="canteen.css">
  <link rel="stylesheet" href="dining-navbar.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div id="dining-navbar-container"></div>
<header class="canteen-header">
  <h1>UniEats</h1>
  <p>Pre-order meals, explore menus, and collect your food with a pickup token.</p>
</header>

<section class="search-section">
  <input type="text" id="searchFood" placeholder="Search food items...">
</section>

<section class="category-tabs">
  <button onclick="filterFood('all')">All</button>
  <button onclick="filterFood('breakfast')">Breakfast</button>
  <button onclick="filterFood('meals')">Meals</button>
  <button onclick="filterFood('snacks')">Snacks</button>
  <button onclick="filterFood('beverages')">Beverages</button>
</section>

<section class="food-grid" id="foodGrid">

  <div class="food-card" data-category="breakfast">
    <img src="images/dosa.jpg" alt="Dosa">
    <div class="food-info">
      <h3>Dosa</h3>
      <p>Campus Special Breakfast</p>
      <span class="rating">⭐ 4.5</span>
      <div class="food-bottom">
        <span>₹50</span>
        <button onclick="openOrder(this)">Pre Order</button>
        <button onclick="addToCart(this)">Add to Cart</button>
      </div>
    </div>
  </div>

  <div class="food-card" data-category="meals">
    <img src="images/biryani.jpg" alt="Biryani">
    <div class="food-info">
      <h3>Chicken Biryani</h3>
      <p>Special Meal</p>
      <span class="rating">⭐ 4.8</span>
      <div class="food-bottom">
        <span>₹120</span>
        <button onclick="openOrder(this)">Pre Order</button>
        <button onclick="addToCart(this)">Add to Cart</button>
      </div>
    </div>
  </div>

  <div class="food-card" data-category="snacks">
    <img src="images/samosa.jpg" alt="Samosa">
    <div class="food-info">
      <h3>Samosa</h3>
      <p>Hot Snack</p>
      <span class="rating">⭐ 4.3</span>
      <div class="food-bottom">
        <span>₹20</span>
        <button onclick="openOrder(this)">Pre Order</button>
        <button onclick="addToCart(this)">Add to Cart</button>
      </div>
    </div>
  </div>

</section>

      <section class="cart-section">
        <h2>Your Cart</h2>

        <div id="cartItems"></div>
        <h3>Total: ₹<span id="cartTotal">0</span></h3>
        <button class="checkout-btn" onclick="openCheckout()">
          Checkout
        </button>
      </section>


<div class="order-popup" id="orderPopup">
  <div class="order-box">

    <h2 id="orderTitle">Checkout</h2>

    <h3 id="orderItem">Food Item</h3>

    <div id="singleOrderBox">
      <label>Quantity</label>
      <input type="number" id="quantity" value="1" min="1" oninput="updateTotal()">
    </div>

    <label>Receiver Place</label>
      <select id="receiverPlace">
        <option value="">Choose Receiver Place</option>
        <option>Main Cafeteria Counter</option>
        <option>Canteen Counter</option>
      </select>

    <label>Pickup Time</label>
    <select id="pickupTime">
      <option value="">Choose Pickup Time</option>
      <option>09:30 AM</option>
      <option>10:00 AM</option>
      <option>10:30 AM</option>
      <option>11:00 AM</option>
      <option>12:00 PM</option>
      <option>12:30 PM</option>
      <option>01:00 PM</option>
      <option>01:30 PM</option>
      <option>02:00 PM</option>
    </select>

    <label>Order Notes</label>
    <textarea
      id="ownerNote"
      placeholder="Example:Less spicy,extra chutney,no onions..."
    ></textarea>

    <label>Payment Method</label>
    <select id="paymentMethod" onchange="showPaymentDetails()">
      <option>UPI</option>
      <option>Google Pay</option>
      <option>PhonePe</option>
      <option>Cash at Counter</option>
    </select>

    <div class="payment-details" id="paymentDetails">
    </div>

    <div class="bill-box">
      <h3>Total: ₹<span id="totalAmount">0</span></h3>
    </div>

    <button class="pay-btn" onclick="confirmOrder()">Pay & Confirm</button>
    <button class="close-btn" onclick="closeOrder()">Cancel</button>

  </div>
</div>

<div class="token-box" id="tokenBox">
  <h2>Order Confirmed ✅</h2>
  <p id="tokenDetails"></p>
  <button onclick="closeToken()">Done</button>
</div>
