<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Combos</title>

  <link rel="stylesheet" href="campus-combos.css">
  <link rel="stylesheet" href="backbutton.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<button class="back-btn" onclick="history.back()">
  <i class="fa-solid fa-arrow-left"></i>
</button>

<header class="combo-header">
  <h1>Campus Combos</h1>
  <p>Quick bites and refreshing combos for students</p>
</header>

<section class="combo-section">

  <div class="combo-card">
    <img src="images/tea-samosa.jpg" alt="Tea Samosa Combo">

    <div class="combo-info">
      <h3>Tea & Samosa Combo</h3>
      <p>Perfect short break combo between classes.</p>

      <div class="combo-bottom">
        <span>₹30</span>
        <button>Add Combo</button>
      </div>
    </div>
  </div>

  <div class="combo-card">
    <img src="images/coffee-sandwich.jpg" alt="Coffee Sandwich Combo">

    <div class="combo-info">
      <h3>Coffee & Sandwich Combo</h3>
      <p>Best pick for study sessions and evening hunger.</p>

      <div class="combo-bottom">
        <span>₹70</span>
        <button>Add Combo</button>
      </div>
    </div>
  </div>

  <div class="combo-card">
    <img src="images/juice-puff.jpg" alt="Juice Puff Combo">

    <div class="combo-info">
      <h3>Juice & Puff Combo</h3>
      <p>Light and refreshing combo for busy students.</p>

      <div class="combo-bottom">
        <span>₹55</span>
        <button>Add Combo</button>
      </div>
    </div>
  </div>

</section>

<script src="campus-combos.js"></script>
</body>
</html>
