<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">
        <!-- LEFT SIDE -->
        <div class="left-section">

            <div class="logo">
                🎓 College Portal
            </div>

            <div class="login-box">


                <!-- Email -->
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">

                <!-- Password -->
                <label>Password</label>

                <div class="password-box">
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
    >
                    <i
                        class="fa-solid fa-eye"
                        id="togglePassword"
                    ></i>
                </div>

                <!-- Forgot Password -->
                <div class="options">
                    <a href="#" onclick="forgotPassword()">Forgot password?</a>
                </div>

                <!-- Sign In -->
                <button class="signin-btn">
                    Sign In
                </button>
                <button class="google-btn" onclick="googleLogin()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" />
                        Sign in with Google
                </button>

                <!-- Sign Up -->
                <p class="signup-text">
                    Don't have an account?
                    <a href="#" onclick="showSignup()">Sign Up</a>
                </p>

                <div class="signup-box" id="signupBox" style="display: none;">
                    <h2>Create Account</h2>

                    <input type="text" id="signupName" placeholder="Enter full name">
                    <input type="email" id="signupEmail" placeholder="Enter email">
                    <div class="password-box">
                    <input type="password" id="signupPassword" placeholder="Create password">
                    <i class="fa-solid fa-eye" id="toggleSignupPassword"></i>
                </div>

    <button class="signin-btn" onclick="registerUser()">
        Register
    </button>

    <p class="signup-text">
        Already have an account?
        <a href="#" onclick="hideSignup()">Login</a>
    </p>
    </div>
            </div>

        </div>
        

        <!-- RIGHT SIDE -->
        <div class="right-section">
    <div class="right-content">
        <p style="font-weight:800; margin-bottom:20px;">
    Access Everything in One Platform - Your Gateway to SNIST's Campus Life!
</p>

<p style="margin-top:10px; line-height:1.7;">
    Navigate Campus, Access Lecture Cabin's,
    Previous Year Question Paper's and Student services with ease.
</p>

       <img
            src="images/portal-illustration.png"
            alt="Portal Illustration"
            class="portal-image">

    </div>
</div>
<!-- your page content -->

</div>

<!-- Firebase scripts (IMPORTANT: before script.js) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<!-- your main JS -->
<script src="script.js"></script>
</body>
</html>
