<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="navbar-container"></div>
  <div class="slider">
    <button class="prev" onclick="changeSlide(-1)">❮</button>

    <div class="slides">
      <img class="slide active" src="images/banner.jpg" alt="Banner 1">
      <img class="slide" src="images/topview.jpg" alt="Banner 2">
      <img class="slide" src="images/firstyearblock.jpg" alt="Banner 3">
    </div>

    <button class="next" onclick="changeSlide(1)">❯</button>
  </div>

  <div class="main-content">
    <div class="cards">
      <div class="card">
        <h3>College Navigation</h3>
        <p>Find blocks, labs, classrooms and offices.</p>
      </div>

      <div class="card">
        <h3>Lecture Cabins</h3>
        <p>View faculty cabin locations.</p>
      </div>

      <div class="card">
        <h3>Previous Papers</h3>
        <p>Access previous year question papers.</p>
      </div>

      <div class="card">
        <h3>Student Services</h3>
        <p>Important student-related services.</p>
      </div>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
  <script src="navbar.js"></script>
</body>
</html>
